name: production-gates

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  platform-matrix:
    name: platform-matrix (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest -q tests

  wheel-artifact-gate:
    name: wheel-artifact-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Verify wheel native payload
        run: python tools/verify_wheel.py dist/*.whl

      - name: Install wheel smoke test
        run: |
          python -m pip install dist/*.whl
          python -c "import picogk; print('picogk import OK')"
